services:
  web:
    build:
      context: .
      dockerfile: Dockerfile
    image: distill-web:latest
    container_name: distill-web
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      # ── LLM Router (火山方舟统一网关) ──
      ARK_API_KEY: ${ARK_API_KEY}
      ARK_BASE_URL: ${ARK_BASE_URL:-https://ark.cn-beijing.volces.com/api/coding/v3}
      DEEPSEEK_MODEL: ${DEEPSEEK_MODEL:-deepseek-v4-pro}
      KIMI_MODEL: ${KIMI_MODEL:-kimi-k2.6}
      DOUBAO_MODEL: ${DOUBAO_MODEL:-doubao-seed-2.0-pro}
      # ── ASR (硅基流动) ──
      SILICONFLOW_API_KEY: ${SILICONFLOW_API_KEY}
      # ── 转录管道 (容器内路径，无需指向宿主机二进制) ──
      YT_DLP_PATH: yt-dlp
      FFMPEG_PATH: /usr/bin/ffmpeg
      FFPROBE_PATH: /usr/bin/ffprobe
      BILIBILI_COOKIES_PATH: /app/secrets/bilibili-cookies.txt
    volumes:
      # cookie文件挂载：宿主机路径需替换为实际路径，文件不打进镜像
      - ./secrets/bilibili-cookies.txt:/app/secrets/bilibili-cookies.txt:ro
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:3000/"]
      interval: 30s
      timeout: 5s
      start_period: 10s
      retries: 3
